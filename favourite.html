<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>TOKYO SHOP - Yêu thích</title>
	<style>
		@import url("https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap");

		:root {
			--bg-start: #f4f7fb;
			--bg-end: #e8eef8;
			--line: #e5e7eb;
			--muted: #6b7280;
			--text: #0f172a;
			--shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
			--radius: 10px;
			--font-ui: "Be Vietnam Pro", "Segoe UI", sans-serif;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body,
		button,
		input,
		select,
		textarea {
			font-family: var(--font-ui);
		}

		body {
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(29, 78, 216, 0.08), transparent 32%),
				linear-gradient(180deg, var(--bg-start), var(--bg-end));
			min-height: 100vh;
		}

		.container {
			max-width: 1240px;
			margin: 26px auto 54px;
			padding: 20px 20px 28px;
			background: radial-gradient(circle at top left, #ffffffee 0, #eff6ff 55%, #dbeafe 100%);
			border-radius: 22px;
			box-shadow: 0 26px 60px rgba(15, 23, 42, 0.45);
		}

		.topbar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			margin-bottom: 20px;
			padding: 8px 4px 4px;
			border-bottom: 1px solid rgba(148, 163, 184, 0.4);
		}

		.title {
			font-size: 24px;
			font-weight: 800;
			letter-spacing: 0.02em;
			background: linear-gradient(120deg, #0f4fa8, #f97316);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;
		}

		.topbar-actions {
			display: flex;
			gap: 10px;
			align-items: center;
		}

		.ghost-btn {
			border: 1px solid #c4d3ff;
			background: linear-gradient(135deg, #ffffff, #e0ecff);
			padding: 8px 12px;
			border-radius: 10px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			font-weight: 600;
			color: #1e293b;
			text-decoration: none;
			box-shadow: 0 8px 20px rgba(148, 163, 184, 0.35);
			transition: transform 0.06s ease, box-shadow 0.12s ease, background 0.12s ease;
		}

		.ghost-btn:hover {
			transform: translateY(-1px);
			box-shadow: 0 14px 30px rgba(59, 130, 246, 0.45);
			background: linear-gradient(135deg, #e0ecff, #dbeafe);
		}

		.panel {
			border: 1px solid rgba(148, 163, 184, 0.25);
			border-radius: var(--radius);
			overflow: hidden;
			background: linear-gradient(135deg, #f9fafb, #eef4ff);
		}

		.acc-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 14px 16px;
			background: linear-gradient(90deg, #e0ecff, #f1f5ff);
		}

		.acc-header .label {
			font-weight: 700;
			color: #0f172a;
		}

		.acc-body {
			padding: 14px 16px 16px;
		}

		.filters {
			display: grid;
			grid-template-columns: 1.2fr 1.6fr 1.8fr 1.2fr 1.2fr auto;
			gap: 12px;
			align-items: end;
		}

		.field label {
			display: block;
			font-size: 12px;
			color: var(--muted);
			margin-bottom: 6px;
			font-weight: 700;
			text-align: center;
		}

		input[type="text"],
		input[type="number"],
		select {
			width: 100%;
			border: 1px solid #c7d2fe;
			border-radius: 999px;
			padding: 10px 12px;
			font-size: 14px;
			outline: none;
			background: linear-gradient(135deg, #ffffff, #eef2ff);
			text-align: center;
			transition: box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
		}

		input[type="text"]:focus,
		input[type="number"]:focus,
		select:focus {
			border-color: #2563eb;
			box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.4);
			background: linear-gradient(135deg, #ffffff, #e0f2fe);
		}

		.pill-select {
			position: relative;
			border-radius: 999px;
			border: 1px solid #c7d2fe;
			background: linear-gradient(135deg, #ffffff, #eef2ff);
			padding: 4px 32px 4px 16px;
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 8px 20px rgba(148, 163, 184, 0.35);
		}

		.pill-select select {
			width: 100%;
			border: none;
			background: transparent;
			padding: 6px 0;
			text-align: center;
			font: inherit;
			color: inherit;
			appearance: none;
			-webkit-appearance: none;
			-moz-appearance: none;
		}

		.pill-select__arrow {
			position: absolute;
			right: 14px;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			pointer-events: none;
			font-size: 13px;
			color: #4b5563;
		}

		.action-btn {
			background: black;
			color: #ffffff;
			border: none;
			border-radius: 10px;
			padding: 11px 16px;
			font-weight: 800;
			cursor: pointer;
			box-shadow: var(--shadow);
			white-space: nowrap;
		}

		.result-head {
			display: flex;
			align-items: center;
			gap: 10px;
			margin: 16px 0 12px;
		}

		.result-head .muted {
			color: var(--muted);
			font-weight: 700;
		}

		.badge {
			background: black;
			color: #fff;
			border-radius: 999px;
			padding: 4px 12px;
			font-weight: 800;
			font-variant-numeric: tabular-nums;
		}

		.status {
			display: none;
			padding: 28px;
			border: 1px dashed var(--line);
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.7);
			text-align: center;
			color: var(--muted);
			font-size: 1rem;
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
		}

		.status.is-visible {
			display: block;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(6, 1fr);
			gap: 14px;
			margin-top: 6px;
		}

		.card {
			border: 1px solid #e5e7eb;
			background: linear-gradient(120deg, #f5f7fb, #e5e9f2);
			border-radius: 18px;
			overflow: hidden;
			box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
			display: flex;
			flex-direction: column;
			min-height: 250px;
			transition: transform 0.08s ease, box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
		}

		.card:hover {
			transform: translateY(-4px);
			box-shadow: 0 24px 46px rgba(15, 23, 42, 0.25);
			border-color: #cbd5f5;
			background: linear-gradient(120deg, #ffffff, #e7ebf3);
		}

		.card-top {
			padding: 10px 12px 0;
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 10px;
		}

		.code {
			font-weight: 700;
			letter-spacing: 0.08em;
			font-size: 11px;
			text-transform: uppercase;
			color: #9ca3af;
		}

		.card-top .fav-toggle {
			position: relative;
			display: inline-flex;
			align-items: flex-start;
			gap: 8px;
			width: 44px;
			min-width: 44px;
			flex: 0 0 44px;
		}

		.card-top .fav-toggle input[type="checkbox"] {
			appearance: none;
			-webkit-appearance: none;
			-moz-appearance: none;
			width: 18px;
			height: 18px;
			border-radius: 5px;
			border: 2px solid #d1d5db;
			background: linear-gradient(145deg, #f9fafb, #e5e7eb);
			box-shadow: inset 0 2px 4px rgba(15, 23, 42, 0.08);
			cursor: pointer;
			transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, transform 0.06s ease;
		}

		.card-top .fav-toggle input[type="checkbox"]:hover {
			transform: translateY(-1px);
			border-color: #cbd5f5;
		}

		.card-top .fav-toggle input[type="checkbox"]:checked {
			border-color: #b91c1c;
			background: linear-gradient(135deg, #fee2e2, #fecaca);
			box-shadow: 0 0 0 1px #b91c1c55;
		}

		.card-top .fav-toggle::after {
			content: "";
			position: absolute;
			left: 26px;
			top: 2px;
			width: 18px;
			height: 18px;
			border-radius: 999px;
			background: radial-gradient(circle at 30% 20%, #fef3c7, #f59e0b);
			box-shadow: 0 5px 10px rgba(180, 83, 9, 0.4);
		}

		.thumb {
			width: 100%;
			height: 150px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: white;
			padding: 10px 14px 0;
		}

		.thumb img {
			max-width: 100%;
			max-height: 100%;
			object-fit: contain;
		}

		.card-body {
			padding: 10px 14px 12px;
			display: flex;
			flex-direction: column;
			gap: 2px;
			margin-top: auto;
			border-top: 1px solid #e5e7eb;
		}

		.name {
			font-weight: 800;
			font-size: 13px;
			line-height: 1.2;
			min-height: 22px;
			overflow: hidden;
			display: -webkit-box;
			line-clamp: 2;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
		}

		.sub {
			color: #9ca3af;
			font-size: 11px;
			line-height: 1.3;
			overflow: hidden;
			display: -webkit-box;
			line-clamp: 2;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			min-height: 16px;
		}

		.meta {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 4px;
			font-variant-numeric: tabular-nums;
			margin-top: 0;
		}

		.meta .price {
			font-weight: 900;
			font-size: 15px;
			color: #b91c1c;
		}

		.meta .stock {
			color: #111827;
			font-weight: 800;
		}

		.meta small {
			color: var(--muted);
			font-weight: 700;
			margin-right: 4px;
		}

		@media (max-width: 1200px) {
			.filters {
				grid-template-columns: 1.2fr 1.6fr 1.8fr 1.2fr 1.2fr auto;
			}

			.grid {
				grid-template-columns: repeat(4, 1fr);
			}
		}

		@media (max-width: 900px) {
			.filters {
				grid-template-columns: 1fr 1fr;
			}

			.grid {
				grid-template-columns: repeat(3, 1fr);
			}
		}

		@media (max-width: 640px) {
			.container {
				margin: 16px auto 32px;
				padding: 16px 12px 24px;
			}

			.rate-box {
				display: none !important;
			}

			.topbar {
				padding: 10px 6px 6px;
			}

			.title {
				font-size: 20px;
			}

			.grid {
				grid-template-columns: repeat(2, 1fr);
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="topbar">
			<div class="title">TOKYO SHOP</div>
			<div class="topbar-actions">
				<a class="ghost-btn" href="inventory.html">Sản phẩm</a>
				<a class="ghost-btn" href="favourite.html">Yêu thích</a>
				<button class="ghost-btn" id="btnLogout" type="button">Đăng xuất</button>
			</div>
		</div>

		<div class="panel">
			<div class="acc-header">
				<div class="label">Lọc theo điều kiện</div>
				<div class="chev">▾</div>
			</div>
			<div class="acc-body">
				<div class="filters">
					<div class="field">
						<label>Mã sản phẩm</label>
						<input type="text" id="fCode" placeholder="VD: CS961139" />
					</div>
					<div class="field">
						<label>Tên sản phẩm</label>
						<input type="text" id="fName" placeholder="Nhập tên sản phẩm..." />
					</div>
					<div class="field">
						<label>Thương hiệu</label>
						<div class="pill-select">
							<select id="fBrand">
								<option value="all">Tất cả</option>
								<option value="Nittaku">Nittaku</option>
								<option value="Stiga">Stiga</option>
								<option value="Butterfly">Butterfly</option>
								<option value="Andro">Andro</option>
								<option value="JUIC">JUIC</option>
								<option value="Yasaka">Yasaka</option>
							</select>
							<span class="pill-select__arrow">▾</span>
						</div>
					</div>
					<div class="field">
						<label>Sắp xếp giá</label>
						<div class="pill-select">
							<select id="fSort">
								<option value="desc">Giá cao → thấp</option>
								<option value="asc">Giá thấp → cao</option>
							</select>
							<span class="pill-select__arrow">▾</span>
						</div>
					</div>
					<div class="field">
						<label>Loại mặt hàng</label>
						<div class="pill-select">
							<select id="fCategory">
								<option value="all">Tất cả</option>
								<option value="Giày">Giày</option>
								<option value="Vợt">Vợt</option>
								<option value="Phụ kiện">Phụ kiện</option>
								<option value="Bóng">Bóng</option>
								<option value="Quần áo">Quần áo</option>
							</select>
							<span class="pill-select__arrow">▾</span>
						</div>
					</div>
					<button class="action-btn" id="btnApply" type="button">Hiển thị</button>
				</div>
			</div>
		</div>

		<div class="result-head">
			<div class="muted">Số lượng sản phẩm</div>
			<div class="badge" id="countBadge">0</div>
		</div>

		<p id="emptyState" class="status" aria-live="polite">You have no favourite products yet.</p>
		<section id="favouritesGrid" class="grid" aria-live="polite"></section>
	</div>

	<script>
		const FAVOURITES_KEY = "favourites";
		const TAX_RATE = 0.10;
		let JPY_RATE = 170;
		let CURRENT_USER = null;
		let PRODUCT_MAP = new Map();
		let DISPLAY_ITEMS = [];

		const formatYen = (n) => "¥ " + Number(n).toLocaleString("ja-JP");
		const priceAfterTax = (base) => Math.round(Number(base) * (1 + TAX_RATE));
		const priceToVND = (base) => Math.round(Number(base) * JPY_RATE);
		const formatVND = (n) => Number(n).toLocaleString("vi-VN") + " VND";

		const grid = document.getElementById("favouritesGrid");
		const emptyState = document.getElementById("emptyState");
		const countBadge = document.getElementById("countBadge");
		const btnLogout = document.getElementById("btnLogout");
		const btnApply = document.getElementById("btnApply");
		const fCode = document.getElementById("fCode");
		const fName = document.getElementById("fName");
		const fBrand = document.getElementById("fBrand");
		const fSort = document.getElementById("fSort");
		const fCategory = document.getElementById("fCategory");

		function normaliseCode(code) {
			return String(code || "").trim().toUpperCase();
		}

		function getCurrentUser() {
			try {
				const raw = localStorage.getItem("jpshop.currentUser");
				return raw ? JSON.parse(raw) : null;
			} catch {
				return null;
			}
		}

		function safeParseFavourites() {
			try {
				const stored = localStorage.getItem(FAVOURITES_KEY);
				const parsed = stored ? JSON.parse(stored) : [];
				return Array.isArray(parsed) ? parsed : [];
			} catch (error) {
				console.warn("Unable to parse favourites from localStorage.", error);
				return [];
			}
		}

		function saveFavourites(favourites) {
			localStorage.setItem(FAVOURITES_KEY, JSON.stringify(favourites));
		}

		function getFavourites() {
			return safeParseFavourites();
		}

		function resolvePath(path) {
			if (!path) {
				return "";
			}

			if (/^(https?:|data:|blob:)/i.test(path)) {
				return path;
			}

			const isFileProtocol = window.location.protocol === "file:";

			if (path.startsWith("/assets/")) {
				return isFileProtocol ? `./public${path}` : `/public${path}`;
			}

			if (path.startsWith("/public/")) {
				return isFileProtocol ? `.${path}` : path;
			}

			if (path.startsWith("/")) {
				const nextPath = isFileProtocol ? `.${path}` : path;
				return nextPath.replace(/\+/g, "%2B");
			}

			return path.replace(/\+/g, "%2B");
		}

		async function loadProductMap() {
			try {
				const response = await fetch(resolvePath("/public/data/products.json"));
				if (!response.ok) {
					throw new Error("Unable to load products.json");
				}

				const data = await response.json();
				const products = Array.isArray(data)
					? data
					: Array.isArray(data && data.products)
						? data.products
						: data && typeof data === "object"
							? [data]
							: [];

				PRODUCT_MAP = new Map(
					products.map((product) => [normaliseCode(product.code), product])
				);
			} catch (error) {
				console.warn("Unable to load product metadata for favourites.", error);
				PRODUCT_MAP = new Map();
			}
		}

		function normaliseFavourite(product) {
			if (!product || typeof product !== "object") {
				return null;
			}

			const code = normaliseCode(product.code);
			const name = String(product.name || "").trim();
			const image = String(product.image || "").trim();
			const url = String(product.url || "").trim();

			if (!code || !name || !image || !url) {
				return null;
			}

			return { code, name, image, url };
		}

		function addToFavourite(product) {
			const nextProduct = normaliseFavourite(product);

			if (!nextProduct) {
				return false;
			}

			const favourites = getFavourites();
			const exists = favourites.some((item) => normaliseCode(item.code) === nextProduct.code);

			if (exists) {
				return false;
			}

			favourites.push(nextProduct);
			saveFavourites(favourites);
			return true;
		}

		function removeFavourite(code) {
			const targetCode = normaliseCode(code);
			const nextFavourites = getFavourites().filter((item) => normaliseCode(item.code) !== targetCode);
			saveFavourites(nextFavourites);
			applyFilters();
		}

		function buildCardProduct(product) {
			const code = normaliseCode(product.code);
			const source = PRODUCT_MAP.get(code) || {};
			return {
				code,
				url: resolvePath(product.url || `inventory.html?product=${encodeURIComponent(code)}`),
				image: source.image || product.image,
				brand: source.brand || product.name || code,
				name: source.name || product.name || code,
				price: source.price,
				stock: source.stock,
				category: source.category || ""
			};
		}

		function getDisplayItems() {
			return getFavourites()
				.map(normaliseFavourite)
				.filter(Boolean)
				.map(buildCardProduct);
		}

		function applyFilters() {
			const codeQ = (fCode.value || "").trim().toLowerCase();
			const nameQ = (fName.value || "").trim().toLowerCase();
			const brand = fBrand.value || "all";
			const sort = fSort.value || "desc";
			const category = fCategory.value || "all";

			let items = getDisplayItems().filter((item) => {
				if (codeQ && !String(item.code || "").toLowerCase().includes(codeQ)) return false;
				if (nameQ) {
					const brandText = String(item.brand || "").toLowerCase();
					const nameText = String(item.name || "").toLowerCase();
					if (!brandText.includes(nameQ) && !nameText.includes(nameQ)) return false;
				}
				if (brand !== "all" && String(item.brand || "").toLowerCase() !== brand.toLowerCase()) return false;
				if (category !== "all" && String(item.category || "") !== category) return false;
				return true;
			});

			items.sort((a, b) => {
				const priceA = Number(a.price) || 0;
				const priceB = Number(b.price) || 0;
				return sort === "asc" ? priceA - priceB : priceB - priceA;
			});

			DISPLAY_ITEMS = items;
			renderFavourites();
		}

		function createCard(product) {
			const isAdmin = CURRENT_USER && CURRENT_USER.role === "admin";
			const hasPrice = Number.isFinite(Number(product.price));
			const codeText = isAdmin ? product.code : "";
			const priceHtml = hasPrice
				? isAdmin
					? `${formatYen(product.price)}`
					: formatVND(priceToVND(priceAfterTax(product.price)))
				: "";
			const vndHtml = hasPrice && isAdmin
				? `<div style="margin-left:auto;font-size:11px;font-weight:700;color:#b91c1c;text-align:right;">${formatVND(priceToVND(priceAfterTax(product.price)))}</div>`
				: "";

			const article = document.createElement("article");
			article.className = "card";
			article.dataset.url = product.url;

			const top = document.createElement("div");
			top.className = "card-top";

			const code = document.createElement("div");
			code.className = "code";
			code.textContent = codeText;

			const toggle = document.createElement("label");
			toggle.className = "fav-toggle";
			toggle.setAttribute("data-code", product.code);
			toggle.setAttribute("title", "Remove from favourites");

			const checkbox = document.createElement("input");
			checkbox.type = "checkbox";
			checkbox.checked = true;
			checkbox.setAttribute("aria-label", `Toggle favourite for ${product.name}`);
			checkbox.addEventListener("click", (event) => {
				event.stopPropagation();
				removeFavourite(product.code);
			});

			toggle.appendChild(checkbox);
			top.append(code, toggle);

			const thumb = document.createElement("div");
			thumb.className = "thumb";

			const image = document.createElement("img");
			image.src = resolvePath(product.image);
			image.alt = product.name;
			image.loading = "lazy";
			image.addEventListener("error", () => {
				const fallbackImage = String(product.image || "").replace(/^\/assets\//, "/public/assets/");
				const resolvedFallback = resolvePath(fallbackImage);
				if (resolvedFallback && image.src !== resolvedFallback) {
					image.src = resolvedFallback;
				}
			});
			thumb.appendChild(image);

			const body = document.createElement("div");
			body.className = "card-body";

			const brand = document.createElement("div");
			brand.className = "name";
			brand.textContent = product.brand || product.name;

			const sub = document.createElement("div");
			sub.className = "sub";
			sub.textContent = product.name;

			const meta = document.createElement("div");
			meta.className = "meta";
			meta.innerHTML = `
				<div class="price">${priceHtml}</div>
				${vndHtml}
			`;

			body.append(brand, sub, meta);
			article.append(top, thumb, body);
			article.addEventListener("click", () => {
				window.location.href = article.dataset.url;
			});
			return article;
		}

		function renderFavourites() {
			grid.innerHTML = "";
			countBadge.textContent = DISPLAY_ITEMS.length.toLocaleString("vi-VN");

			if (!DISPLAY_ITEMS.length) {
				emptyState.classList.add("is-visible");
				return;
			}

			emptyState.classList.remove("is-visible");
			grid.append(...DISPLAY_ITEMS.map(createCard));
		}

		window.addToFavourite = addToFavourite;
		window.getFavourites = getFavourites;
		window.removeFavourite = removeFavourite;

		document.addEventListener("DOMContentLoaded", async () => {
			CURRENT_USER = getCurrentUser();
			if (!CURRENT_USER) {
				window.location.href = "index.html";
				return;
			}

			btnLogout.addEventListener("click", () => {
				localStorage.removeItem("jpshop.currentUser");
				window.location.href = "index.html";
			});

			btnApply.addEventListener("click", applyFilters);
			fSort.addEventListener("change", applyFilters);
			fCategory.addEventListener("change", applyFilters);
			fBrand.addEventListener("change", applyFilters);
			[fCode, fName].forEach((element) => {
				element.addEventListener("keydown", (event) => {
					if (event.key === "Enter") {
						applyFilters();
					}
				});
			});

			await loadProductMap();
			applyFilters();
		});
	</script>
</body>
</html>
