<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>JPSHOP - Giỏ hàng</title>
	<style>
		@import url("https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap");

		:root {
			--bg: #eef3fb;
			--panel: rgba(255, 255, 255, 0.94);
			--panel-strong: #ffffff;
			--line: #d9e2ef;
			--text: #0f172a;
			--muted: #64748b;
			--primary: #1d4ed8;
			--primary-dark: #1e40af;
			--danger: #dc2626;
			--danger-soft: #fee2e2;
			--success-soft: #e0f2fe;
			--shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
			--radius: 22px;
			--font-ui: "Be Vietnam Pro", "Segoe UI", sans-serif;
		}

		* {
			box-sizing: border-box;
		}

		body,
		button,
		input,
		select,
		textarea {
			font-family: var(--font-ui);
		}

		body {
			margin: 0;
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 28%),
				radial-gradient(circle at top right, rgba(14, 165, 233, 0.16), transparent 24%),
				linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
			min-height: 100vh;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		.cart-shell {
			max-width: 1240px;
			margin: 0 auto;
			padding: 28px 18px 40px;
		}

		.page-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			margin-bottom: 24px;
		}

		.page-title-wrap h1 {
			margin: 0;
			font-size: clamp(2rem, 4vw, 3rem);
			line-height: 1;
		}

		.page-title-wrap p {
			margin: 10px 0 0;
			color: var(--muted);
			font-size: 0.98rem;
		}

		.header-actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			justify-content: flex-end;
		}

		.btn,
		.button-link {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			padding: 0.82rem 1.15rem;
			border-radius: 999px;
			border: 1px solid transparent;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
			transition: transform 0.08s ease, box-shadow 0.15s ease, background-color 0.15s ease;
		}

		.btn:hover,
		.button-link:hover {
			transform: translateY(-1px);
		}

		.btn:disabled {
			opacity: 0.55;
			cursor: not-allowed;
			transform: none;
		}

		.btn--primary {
			background: linear-gradient(135deg, var(--primary), #3b82f6);
			color: #fff;
			box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
		}

		.btn--primary:hover {
			background: linear-gradient(135deg, var(--primary-dark), var(--primary));
		}

		.btn--ghost,
		.button-link {
			background: rgba(255, 255, 255, 0.85);
			border-color: #cbd5e1;
			color: var(--text);
		}

		.btn--danger {
			background: var(--danger-soft);
			border-color: #fecaca;
			color: var(--danger);
		}

		.cart-layout {
			display: grid;
			grid-template-columns: minmax(0, 1.9fr) minmax(270px, 0.68fr);
			gap: 22px;
			align-items: start;
		}

		.panel,
		.summary-card {
			background: var(--panel);
			border: 1px solid rgba(203, 213, 225, 0.7);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			backdrop-filter: blur(14px);
		}

		.panel {
			overflow: hidden;
		}

		.panel-header,
		.summary-card {
			padding: 22px;
		}

		.panel-header {
			border-bottom: 1px solid var(--line);
			background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(241,245,249,0.85));
		}

		.panel-header h2,
		.summary-card h2 {
			margin: 0;
			font-size: 1.15rem;
		}

		.panel-header p,
		.summary-note {
			margin: 8px 0 0;
			color: var(--muted);
			font-size: 0.94rem;
		}

		.table-wrap {
			padding: 0 18px 18px;
		}

		.cart-table {
			width: 100%;
			border-collapse: collapse;
			table-layout: fixed;
		}

		.cart-table thead th:first-child {
			width: 36%;
		}

		.cart-table thead th:nth-child(2) {
			width: 16%;
		}

		.cart-table thead th:nth-child(3) {
			width: 22%;
		}

		.cart-table thead th:nth-child(4) {
			width: 16%;
		}

		.cart-table thead th {
			padding: 14px 12px;
			font-size: 0.82rem;
			letter-spacing: 0.03em;
			text-transform: uppercase;
			text-align: left;
			color: var(--muted);
			border-bottom: 1px solid var(--line);
		}

		.cart-table thead th:last-child {
			width: 120px;
			min-width: 120px;
			white-space: nowrap;
			text-align: center;
		}

		.cart-table tbody td {
			padding: 18px 12px;
			border-bottom: 1px solid var(--line);
			vertical-align: middle;
		}

		.cart-table tbody tr:last-child td {
			border-bottom: none;
		}

		.product-cell {
			display: flex;
			align-items: center;
			gap: 14px;
			min-width: 0;
		}

		.product-image-link {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border-radius: 18px;
			padding: 0;
			border: none;
			background: transparent;
			cursor: pointer;
			flex-shrink: 0;
		}

		.product-image-link:focus-visible,
		.product-link:focus-visible {
			outline: 2px solid #60a5fa;
			outline-offset: 3px;
		}

		.product-image {
			width: 72px;
			height: 72px;
			border-radius: 18px;
			object-fit: cover;
			background: linear-gradient(135deg, #eff6ff, #e2e8f0);
			border: 1px solid #dbeafe;
			flex-shrink: 0;
		}

		.product-meta {
			display: flex;
			flex-direction: column;
			gap: 6px;
			min-width: 0;
		}

		.product-name {
			font-weight: 800;
			line-height: 1.35;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.product-link {
			color: inherit;
			text-decoration: none;
			padding: 0;
			border: none;
			background: transparent;
			text-align: left;
			cursor: pointer;
		}

		.product-link:hover {
			color: var(--primary);
		}

		.detail-panel {
			position: fixed;
			inset: 0;
			z-index: 80;
			padding: 20px 16px;
			background: rgba(15, 23, 42, 0.58);
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.detail-panel[hidden] {
			display: none;
		}

		.detail-modal {
			width: min(960px, 100%);
			max-height: 90vh;
			overflow: auto;
			padding: 18px;
			background: #ffffff;
			border: 1px solid rgba(203, 213, 225, 0.85);
			border-radius: 24px;
			box-shadow: 0 24px 55px rgba(15, 23, 42, 0.28);
		}

		.detail-header {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 16px;
			margin-bottom: 16px;
		}

		.detail-label {
			font-size: 0.75rem;
			font-weight: 800;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: var(--primary);
		}

		.detail-name {
			margin-top: 6px;
			font-size: 1.18rem;
			font-weight: 800;
		}

		.detail-main {
			display: flex;
			align-items: flex-start;
			gap: 22px;
		}

		.detail-media {
			flex: 0 0 320px;
			width: 320px;
		}

		.detail-image-frame {
			position: relative;
			width: 100%;
			height: 280px;
			padding: 12px 34px;
			border-radius: 20px;
			border: 1px solid var(--line);
			background: linear-gradient(180deg, #ffffff, #f8fbff);
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.detail-image-frame img {
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		.detail-nav {
			position: absolute;
			top: 50%;
			transform: translateY(-50%);
			width: 30px;
			height: 30px;
			border-radius: 999px;
			border: 1px solid var(--line);
			background: rgba(255, 255, 255, 0.92);
			font: inherit;
			font-weight: 800;
			cursor: pointer;
		}

		.detail-nav--prev {
			left: 8px;
		}

		.detail-nav--next {
			right: 8px;
		}

		.detail-thumbs {
			margin-top: 12px;
			display: flex;
			gap: 10px;
			justify-content: center;
			flex-wrap: wrap;
		}

		.detail-thumb {
			width: 74px;
			height: 74px;
			padding: 0;
			border-radius: 14px;
			border: 1px solid var(--line);
			background: #f8fbff;
			overflow: hidden;
			cursor: pointer;
		}

		.detail-thumb img {
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		.detail-thumb--active {
			border-color: #3b82f6;
			box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
			background: #ffffff;
		}

		.detail-table {
			width: 100%;
			border-collapse: collapse;
			font-size: 0.92rem;
		}

		.detail-table th,
		.detail-table td {
			padding: 8px 10px;
			border-bottom: 1px solid var(--line);
			text-align: left;
			vertical-align: top;
		}

		.detail-table th {
			width: 34%;
			color: var(--muted);
			font-weight: 700;
			white-space: nowrap;
		}

		.detail-table td {
			font-weight: 500;
		}

		.product-code {
			font-size: 0.88rem;
			color: var(--muted);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.price-cell,
		.subtotal-cell,
		.action-cell {
			white-space: nowrap;
		}

		.price-cell,
		.subtotal-cell {
			font-size: clamp(0.95rem, 1.4vw, 1.05rem);
			font-weight: 800;
			letter-spacing: -0.01em;
		}

		.action-cell {
			width: 120px;
			min-width: 120px;
			text-align: center;
		}

		.action-cell .btn {
			min-width: 84px;
			padding-inline: 1rem;
		}

		.qty-control {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 5px;
			border-radius: 999px;
			background: #eff6ff;
			border: 1px solid #bfdbfe;
		}

		.qty-button {
			width: 32px;
			height: 32px;
			border-radius: 50%;
			border: none;
			background: var(--panel-strong);
			color: var(--text);
			font-size: 1.1rem;
			cursor: pointer;
			box-shadow: 0 8px 18px rgba(37, 99, 235, 0.12);
		}

		.qty-input {
			width: 52px;
			border: none;
			background: transparent;
			text-align: center;
			font: inherit;
			font-weight: 700;
			color: var(--text);
			outline: none;
		}

		.qty-input::-webkit-outer-spin-button,
		.qty-input::-webkit-inner-spin-button {
			-webkit-appearance: none;
			margin: 0;
		}

		.subtotal-cell {
			font-weight: 800;
		}

		.summary-card {
			position: sticky;
			top: 18px;
			display: flex;
			flex-direction: column;
			gap: 18px;
			max-width: 430px;
			width: 100%;
			justify-self: end;
		}

		.summary-box {
			display: grid;
			gap: 14px;
			padding: 16px 18px;
			border-radius: 20px;
			background: linear-gradient(180deg, #ffffff, #f8fbff);
			border: 1px solid var(--line);
		}

		.summary-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 14px;
		}

		.summary-row span:first-child {
			color: var(--muted);
		}

		.summary-row strong {
			font-size: 1.05rem;
		}

		.summary-row--total {
			padding-top: 12px;
			border-top: 1px dashed var(--line);
		}

		.summary-row--total strong {
			font-size: 1.35rem;
		}

		.summary-actions {
			display: grid;
			gap: 12px;
		}

		.order-form {
			display: grid;
			gap: 10px;
			padding: 16px 18px;
			border-radius: 20px;
			background: linear-gradient(180deg, #ffffff, #f8fbff);
			border: 1px solid var(--line);
		}

		.order-form[hidden] {
			display: none !important;
		}

		.order-form label {
			font-size: 0.88rem;
			font-weight: 700;
			color: var(--muted);
		}

		.order-input {
			width: 100%;
			padding: 0.9rem 1rem;
			border-radius: 16px;
			border: 1px solid #cbd5e1;
			background: #ffffff;
			font: inherit;
			color: var(--text);
			outline: none;
			transition: border-color 0.15s ease, box-shadow 0.15s ease;
		}

		.order-input:focus {
			border-color: #60a5fa;
			box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
		}

		.order-status {
			min-height: 1.2em;
			font-size: 0.88rem;
			color: var(--muted);
		}

		.order-status[data-state="success"] {
			color: #047857;
		}

		.order-status[data-state="error"] {
			color: var(--danger);
		}

		.empty-state {
			padding: 44px 22px 28px;
			text-align: center;
		}

		.empty-state-card {
			max-width: 460px;
			margin: 0 auto;
			padding: 28px;
			border-radius: 26px;
			border: 1px dashed #bfdbfe;
			background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(224,242,254,0.65));
		}

		.empty-state h3 {
			margin: 0 0 10px;
			font-size: 1.45rem;
		}

		.empty-state p {
			margin: 0 0 18px;
			color: var(--muted);
		}

		@media (max-width: 980px) {
			.cart-layout {
				grid-template-columns: 1fr;
			}

			.summary-card {
				position: static;
			}
		}

		@media (max-width: 760px) {
			.cart-shell {
				padding: 20px 14px 32px;
			}

			.page-header {
				flex-direction: column;
				align-items: stretch;
			}

			.header-actions {
				justify-content: stretch;
			}

			.header-actions > * {
				flex: 1 1 auto;
			}

			.cart-table thead {
				display: none;
			}

			.cart-table,
			.cart-table tbody,
			.cart-table tr,
			.cart-table td {
				display: block;
				width: 100%;
			}

			.cart-table tbody tr {
				padding: 18px 0;
				border-bottom: 1px solid var(--line);
			}

			.cart-table tbody td {
				padding: 10px 0;
				border: none;
			}

			.cart-table tbody td::before {
				content: attr(data-label);
				display: block;
				margin-bottom: 8px;
				font-size: 0.82rem;
				font-weight: 700;
				letter-spacing: 0.03em;
				text-transform: uppercase;
				color: var(--muted);
			}

			.product-cell::before {
				margin-bottom: 12px;
			}

			.product-cell {
				align-items: flex-start;
				min-width: 0;
			}

			.qty-control {
				width: fit-content;
			}

			.action-cell {
				width: 100%;
				min-width: 0;
				text-align: left;
			}

			.action-cell .btn {
				width: 100%;
				max-width: 140px;
			}

			.detail-header,
			.detail-main {
				flex-direction: column;
			}

			.detail-media {
				width: 100%;
				flex-basis: auto;
			}

			.detail-image-frame {
				height: 240px;
			}

			.detail-table th,
			.detail-table td {
				display: block;
				width: 100%;
				white-space: normal;
			}

			.detail-table th {
				padding-bottom: 2px;
				border-bottom: none;
			}

			.detail-table td {
				padding-top: 0;
			}
		}
	</style>
</head>
<body>
	<div class="cart-shell">
		<header class="page-header">
			<div class="page-title-wrap">
				<h1>Giỏ hàng</h1>
			</div>
			
		</header>

		<main class="cart-layout">
			<section class="panel">
				<div class="panel-header">
					<h2>Sản phẩm trong giỏ</h2>
					<p>Điều chỉnh số lượng, xóa sản phẩm và xem tổng tiền cập nhật ngay lập tức.</p>
				</div>

				<div id="emptyState" class="empty-state" hidden>
					<div class="empty-state-card">
						<h3>Giỏ hàng của bạn đang trống.</h3>
						<button class="btn btn--primary" type="button" data-continue-shopping>Tiếp tục mua sắm</button>
					</div>
				</div>

				<div id="cartTableWrap" class="table-wrap">
					<table class="cart-table">
						<thead>
							<tr>
								<th>Sản phẩm</th>
								<th>Đơn giá</th>
								<th>Số lượng</th>
								<th>Tạm tính</th>
								<th>Thao tác</th>
							</tr>
						</thead>
						<tbody id="cartRows"></tbody>
					</table>
				</div>
			</section>

			<aside class="summary-card">
				<div>
					<h2>Tóm tắt giỏ hàng</h2>
				</div>

				<div class="summary-box">
					<div class="summary-row">
						<span>Tổng sản phẩm</span>
						<strong id="totalItems">0</strong>
					</div>
					<div class="summary-row summary-row--total">
						<span>Tổng tiền</span>
						<strong id="totalPrice">0</strong>
					</div>
				</div>

				<div class="order-form" hidden>
					<label for="guestAccountNumber">Guest Account Number</label>
					<input id="guestAccountNumber" class="order-input" type="text" placeholder="GUEST-018" autocomplete="off" />
				</div>
				<div id="orderStatus" class="order-status" aria-live="polite"></div>

				<div class="summary-actions">
					<button id="clearCartButton" class="btn btn--ghost" type="button">Xóa giỏ hàng</button>
					<button id="checkoutButton" class="btn btn--primary" type="button">Gửi đơn</button>
					<button class="btn btn--ghost" type="button" data-continue-shopping>Tiếp tục mua sắm</button>
				</div>
			</aside>
		</main>
	</div>

	<div class="detail-panel" id="detailPanel" hidden>
		<div class="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detailName">
			<div class="detail-header">
				<div>
					<div class="detail-label">Chi tiết sản phẩm</div>
					<div class="detail-name" id="detailName"></div>
				</div>
				<button class="btn btn--ghost" id="btnCloseDetail" type="button">Đóng chi tiết</button>
			</div>
			<div class="detail-main">
				<div class="detail-media">
					<div class="detail-image-frame">
						<button class="detail-nav detail-nav--prev" id="detailPrev" type="button" aria-label="Hình trước">‹</button>
						<img id="detailImage" alt="" loading="lazy" />
						<button class="detail-nav detail-nav--next" id="detailNext" type="button" aria-label="Hình sau">›</button>
					</div>
					<div class="detail-thumbs" id="detailThumbs"></div>
				</div>
				<table class="detail-table" id="detailTable"></table>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
	<script>
	(function(){
		emailjs.init("cslnYxPuDWfnLvvl6");
	})();
	</script>
	<script src="src/js/cart-store.js" defer></script>
	<script src="src/js/cart-page.js" defer></script>
	<script src="src/js/order.js" defer></script>
</body>
</html>
